<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meal Log PRO | Silent Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; color: #222; padding: 10px; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; }
        .btn-m { padding: 8px 15px; background: #f1f3f5; border-radius: 10px; border: none; cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cal-grid div { padding: 12px 0; font-size: 0.95rem; border-radius: 12px; cursor: pointer; }
        .day-cell.active { background: #5c7cfa !important; color: white !important; font-weight: bold; }
        .day-cell.has-data::after { content: ''; display: block; width: 5px; height: 5px; background: #ff6b6b; border-radius: 50%; margin: 2px auto 0; }
        
        .input-row { display: flex; gap: 12px; align-items: flex-start; }
        .photo-area { width: 100px; height: 100px; background: #f8f9fa; border: 2px dashed #ccd0d5; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; overflow: hidden; position: relative; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 1rem; height: 60px; resize: none; font-family: inherit; }
        #fieldTime { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 0.9rem; background: #fff; }
        .save-btn { width: 100%; background: #5c7cfa; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }

        .feed-card { background: white; border-radius: 20px; margin-bottom: 15px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .feed-content { display: flex; gap: 12px; align-items: flex-start; }
        .feed-photo { width: 150px; height: 150px; border-radius: 12px; overflow: hidden; position: relative; flex-shrink: 0; background: #eee; }
        .feed-photo img { width: 100%; height: 100%; object-fit: cover; }
        .feed-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-height: 150px; padding: 2px 0; }
        .feed-memo { font-size: 1rem; line-height: 1.4; color: #333; white-space: pre-wrap; }
        
        .feed-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px solid #f1f3f5; width: 100%; }
        .feed-time-text { font-size: 0.85rem; color: #5c7cfa; font-weight: bold; }
        .feed-delete-btn { font-size: 0.85rem; color: #ff6b6b; cursor: pointer; padding: 5px; }
        .time-stamp { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px; font-family: monospace; pointer-events: none; text-align: right; }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: #5c7cfa; }
    </style>
</head>
<body>
<div id="loadingOverlay">저장 중...</div>
<div class="container">
    <div class="card">
        <div class="cal-header"><button class="btn-m" onclick="changeMonth(-1)">◀</button><span id="labelMonth"></span><button class="btn-m" onclick="changeMonth(1)">▶</button></div>
        <div id="gridDays" class="cal-grid"></div>
    </div>
    <div class="card">
        <div class="input-row">
            <div class="photo-area" onclick="document.getElementById('fileIn').click()"><div id="boxPreview">📷 사진 추가</div></div>
            <div class="fields"><input type="datetime-local" id="fieldTime"><textarea id="fieldMemo" placeholder="식단 메모..."></textarea></div>
        </div>
        <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="onFileChange(this)">
        <button class="save-btn" id="saveBtn" onclick="onSave()">오늘의 기록 저장하기</button>
    </div>
    <div id="listFeed"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz6bpDE-ftbwKqmrfp5rrBrzlWFc3EGqJJD02cQ8THBMdehxyYlF3xJ9JIHx7JARcY/exec";
    const DB_KEY = 'MEAL_LOG_V15_OPTIMIZED';
    
    let mealDB = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    let calendarDate = new Date();
    let activeDateStr = getFormatDate(new Date());
    let tempImgs = [];

    window.onload = function() { initTimeField(new Date()); renderAll(); };

    function initTimeField(date) {
        const off = date.getTimezoneOffset() * 60000;
        document.getElementById('fieldTime').value = new Date(date - off).toISOString().slice(0, 16);
    }

    function getFormatDate(date) {
        const d = new Date(date);
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    }

    function compressImage(imgSrc, callback) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 600;
            let width = img.width, height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.5));
        };
        img.src = imgSrc;
    }

    function onFileChange(input) {
        tempImgs = []; const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            EXIF.getData(file, function() {
                const dt = EXIF.getTag(this, "DateTimeOriginal");
                let pDay = "", pTime = "";
                if (dt) {
                    const p = dt.split(" ");
                    pDay = p[0].replace(/:/g, "-"); pTime = p[1].substring(0, 5);
                    activeDateStr = pDay; calendarDate = new Date(pDay);
                    document.getElementById('fieldTime').value = pDay + "T" + pTime;
                } else {
                    const n = new Date(); pTime = String(n.getHours()).padStart(2, '0') + ":" + String(n.getMinutes()).padStart(2, '0');
                    pDay = getFormatDate(n);
                }
                compressImage(e.target.result, function(compressedData) {
                    tempImgs.push({ data: compressedData, timeStamp: pDay + " " + pTime });
                    document.getElementById('boxPreview').innerHTML = `<img src="${compressedData}">`;
                    renderAll();
                });
            });
        };
        reader.readAsDataURL(file);
    }

    async function onSave() {
        const btn = document.getElementById('saveBtn');
        const fTime = document.getElementById('fieldTime').value;
        const memo = document.getElementById('fieldMemo').value;
        if (!fTime || btn.disabled) return;

        const dt = fTime.split("T");
        const record = { id: Date.now(), time: dt[1], memo: memo, imgs: tempImgs };
        
        const overlay = document.getElementById('loadingOverlay');
        overlay.innerText = "저장 중...";
        overlay.style.display = 'flex';
        btn.disabled = true;

        const payload = {
            action: "save",
            date: dt[0],
            time: dt[1],
            memo: memo,
            image: tempImgs.length > 0 ? tempImgs[0].data : ""
        };

        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            
            if (!mealDB[dt[0]]) mealDB[dt[0]] = [];
            mealDB[dt[0]].push(record);
            localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
            
            tempImgs = []; document.getElementById('boxPreview').innerHTML = "📷 사진 추가";
            document.getElementById('fieldMemo').value = "";
            activeDateStr = dt[0]; renderAll();
        } catch (e) {
            console.error("Save error", e);
        } finally {
            overlay.style.display = 'none';
            btn.disabled = false;
        }
    }

    async function onDelete(d, id) {
        if (!confirm("이 기록을 삭제할까요?")) return;
        
        const targetIdx = mealDB[d].findIndex(x => x.id === id);
        if (targetIdx === -1) return;
        
        const targetData = mealDB[d][targetIdx];
        const overlay = document.getElementById('loadingOverlay');
        overlay.innerText = "삭제 중...";
        overlay.style.display = 'flex';

        try {
            await fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "delete",
                    date: d,
                    time: targetData.time,
                    memo: targetData.memo
                })
            });

            mealDB[d].splice(targetIdx, 1);
            if (!mealDB[d].length) delete mealDB[d];
            localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
            renderAll();
        } catch (e) {
            console.error("Delete error", e);
        } finally {
            overlay.style.display = 'none';
        }
    }

    function renderAll() {
        const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
        document.getElementById('labelMonth').innerText = `${y}.${m + 1}`;
        const startDay = new Date(y, m, 1).getDay(), endDate = new Date(y, m + 1, 0).getDate();
        const grid = document.getElementById('gridDays'); grid.innerHTML = '';
        for (let i = 0; i < startDay; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= endDate; d++) {
            const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const div = document.createElement('div');
            div.className = 'day-cell' + (dStr === activeDateStr ? ' active' : '') + (mealDB[dStr] ? ' has-data' : '');
            div.innerText = d; div.onclick = () => { activeDateStr = dStr; renderAll(); };
            grid.appendChild(div);
        }
        const list = document.getElementById('listFeed');
        const items = mealDB[activeDateStr] || [];
        let html = `<h3 style="padding: 10px 5px;">📂 ${activeDateStr} 기록</h3>`;
        if (!items.length) html += '<p style="text-align:center; padding:50px; color:#ccc;">기록 없음</p>';
        else {
            items.sort((a,b) => a.time.localeCompare(b.time)).forEach(it => {
                const hasPhoto = it.imgs && it.imgs.length > 0;
                let photoHtml = '';
                if (hasPhoto) {
                    const im = it.imgs[0];
                    photoHtml = `<div class="feed-photo"><img src="${im.data}"><span class="time-stamp">${im.timeStamp.split(' ')[1]}</span></div>`;
                }
                html += `
                    <div class="feed-card">
                        <div class="feed-content">
                            ${photoHtml}
                            <div class="feed-info">
                                <div class="feed-memo">${it.memo || ''}</div>
                                <div class="feed-footer">
                                    <span class="feed-time-text">${hasPhoto ? '' : '🕒 ' + it.time}</span>
                                    <span class="feed-delete-btn" onclick="onDelete('${activeDateStr}', ${it.id})">삭제</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }
        list.innerHTML = html;
    }

    function changeMonth(v) { calendarDate.setMonth(calendarDate.getMonth() + v); renderAll(); }
</script>
</body>
</html>

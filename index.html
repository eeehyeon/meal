<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meal Log PRO | Final Minimal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; color: #222; padding: 8px; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 12px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-weight: bold; font-size: 0.85rem; }
        .btn-m { padding: 3px 10px; background: #f1f3f5; border-radius: 8px; border: none; cursor: pointer; font-size: 0.75rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cal-grid div { padding: 4px 0; font-size: 0.8rem; border-radius: 10px; cursor: pointer; }
        .day-cell.active { background: #5c7cfa !important; color: white !important; font-weight: bold; }
        .day-cell.has-data::after { content: ''; display: block; width: 4px; height: 4px; background: #ff6b6b; border-radius: 50%; margin: 1px auto 0; }
        
        /* 1. 사진 입력창 가로로 크게 조정 */
        .input-row { display: flex; flex-direction: column; gap: 8px; }
        .photo-area { width: 100%; height: 120px; background: #f8f9fa; border: 2px dashed #ccd0d5; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; overflow: hidden; position: relative; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        
        .fields { display: flex; flex-direction: column; gap: 6px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 8px; font-size: 0.9rem; height: 45px; resize: none; font-family: inherit; }
        #fieldTime { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 6px; font-size: 0.85rem; background: #fff; }
        .save-btn { width: 100%; background: #5c7cfa; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; margin-top: 5px; font-size: 0.95rem; }

        /* 리스트 카드 디자인 수정 */
        .feed-card { background: white; border-radius: 20px; margin-bottom: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; cursor: pointer; }
        /* 2. 중간 옅은 선 제거 및 레이아웃 정리 */
        .feed-content { display: flex; flex-direction: column; gap: 8px; }
        
        .feed-header-info { display: flex; align-items: center; gap: 10px; }
        .feed-time-text { font-size: 0.85rem; color: #5c7cfa; font-weight: bold; white-space: nowrap; }
        
        /* 3. 수동 입력 시 시간 옆에 메모 */
        .feed-memo { font-size: 1rem; line-height: 1.4; color: #333; white-space: pre-wrap; }
        
        /* 4 & 6. 사진 입력 시 시간 아래 사진 배치 및 1.3배 확대 */
        .feed-photo { width: 130px; height: 130px; border-radius: 12px; overflow: hidden; background: #eee; margin-top: 4px; }
        .feed-photo img { width: 100%; height: 100%; object-fit: cover; }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: #5c7cfa; }
    </style>
</head>
<body>
<div id="loadingOverlay">저장 중...</div>
<div class="container">
    <div class="card">
        <div class="cal-header"><button class="btn-m" onclick="changeMonth(-1)">◀</button><span id="labelMonth"></span><button class="btn-m" onclick="changeMonth(1)">▶</button></div>
        <div id="gridDays" class="cal-grid"></div>
    </div>
    
    <div class="card">
        <div class="input-row">
            <div class="photo-area" onclick="document.getElementById('fileIn').click()"><div id="boxPreview">📷 사진 추가 (터치)</div></div>
            <div class="fields">
                <input type="datetime-local" id="fieldTime">
                <textarea id="fieldMemo" placeholder="메모를 입력하세요..."></textarea>
            </div>
        </div>
        <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="onFileChange(this)">
        <button class="save-btn" id="saveBtn" onclick="onSave()">기록 저장</button>
    </div>
    
    <div id="listFeed"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz6bpDE-ftbwKqmrfp5rrBrzlWFc3EGqJJD02cQ8THBMdehxyYlF3xJ9JIHx7JARcY/exec";
    const DB_KEY = 'MEAL_LOG_V15_OPTIMIZED';
    
    let mealDB = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    let calendarDate = new Date();
    let activeDateStr = getFormatDate(new Date());
    let tempImgs = [];

    window.onload = function() { initTimeField(new Date()); renderAll(); };

    function initTimeField(date) {
        const off = date.getTimezoneOffset() * 60000;
        document.getElementById('fieldTime').value = new Date(date - off).toISOString().slice(0, 16);
    }

    function getFormatDate(date) {
        const d = new Date(date);
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    }

    function compressImage(imgSrc, callback) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 800; 
            let width = img.width, height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = imgSrc;
    }

    function onFileChange(input) {
        tempImgs = []; const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            EXIF.getData(file, function() {
                const dt = EXIF.getTag(this, "DateTimeOriginal");
                let pDay = "", pTime = "";
                if (dt) {
                    const p = dt.split(" ");
                    pDay = p[0].replace(/:/g, "-"); pTime = p[1].substring(0, 5);
                    activeDateStr = pDay; calendarDate = new Date(pDay);
                    document.getElementById('fieldTime').value = pDay + "T" + pTime;
                } else {
                    const n = new Date(); pTime = String(n.getHours()).padStart(2, '0') + ":" + String(n.getMinutes()).padStart(2, '0');
                    pDay = getFormatDate(n);
                }
                compressImage(e.target.result, function(compressedData) {
                    tempImgs.push({ data: compressedData, time: pTime });
                    document.getElementById('boxPreview').innerHTML = `<img src="${compressedData}">`;
                    renderAll();
                });
            });
        };
        reader.readAsDataURL(file);
    }

    async function onSave() {
        const btn = document.getElementById('saveBtn');
        const fTime = document.getElementById('fieldTime').value;
        const memo = document.getElementById('fieldMemo').value;
        if (!fTime || btn.disabled) return;
        const dt = fTime.split("T");
        const record = { id: Date.now(), time: dt[1], memo: memo, imgs: tempImgs };
        const overlay = document.getElementById('loadingOverlay');
        // 5. 저장 중.. 멘트 수정
        overlay.innerText = "저장 중...";
        overlay.style.display = 'flex';
        btn.disabled = true;
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", date: dt[0], time: dt[1], memo: memo, image: tempImgs.length > 0 ? tempImgs[0].data : "" }) });
            if (!mealDB[dt[0]]) mealDB[dt[0]] = [];
            mealDB[dt[0]].push(record);
            localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
            tempImgs = []; document.getElementById('boxPreview').innerHTML = "📷 사진 추가 (터치)";
            document.getElementById('fieldMemo').value = "";
            activeDateStr = dt[0]; renderAll();
        } catch (e) { console.error(e); }
        finally { overlay.style.display = 'none'; btn.disabled = false; }
    }

    async function onDelete(d, id) {
        // 7. 삭제 글자 대신 칸 선택 시 삭제
        if (!confirm("이 기록을 삭제할까요?")) return;
        const targetIdx = mealDB[d].findIndex(x => x.id === id);
        if (targetIdx === -1) return;
        const targetData = mealDB[d][targetIdx];
        const overlay = document.getElementById('loadingOverlay');
        overlay.innerText = "삭제 중...";
        overlay.style.display = 'flex';
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", date: d, time: targetData.time, memo: targetData.memo }) });
            mealDB[d].splice(targetIdx, 1);
            if (!mealDB[d].length) delete mealDB[d];
            localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
            renderAll();
        } catch (e) { console.error(e); }
        finally { overlay.style.display = 'none'; }
    }

    function renderAll() {
        const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
        document.getElementById('labelMonth').innerText = `${y}.${m + 1}`;
        const startDay = new Date(y, m, 1).getDay(), endDate = new Date(y, m + 1, 0).getDate();
        const grid = document.getElementById('gridDays'); grid.innerHTML = '';
        for (let i = 0; i < startDay; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= endDate; d++) {
            const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const div = document.createElement('div');
            div.className = 'day-cell' + (dStr === activeDateStr ? ' active' : '') + (mealDB[dStr] ? ' has-data' : '');
            div.innerText = d; div.onclick = () => { activeDateStr = dStr; renderAll(); };
            grid.appendChild(div);
        }
        const list = document.getElementById('listFeed');
        const items = mealDB[activeDateStr] || [];
        let html = `<h3 style="padding: 10px 5px; font-size: 1rem;">📂 ${activeDateStr}</h3>`;
        if (!items.length) html += '<p style="text-align:center; padding:30px; color:#ccc; font-size:0.9rem;">기록 없음</p>';
        else {
            items.sort((a,b) => a.time.localeCompare(b.time)).forEach(it => {
                const hasPhoto = it.imgs && it.imgs.length > 0;
                let photoHtml = hasPhoto ? `<div class="feed-photo"><img src="${it.imgs[0].data}"></div>` : '';
                
                // 수동입력/사진입력 레이아웃 구분
                html += `
                    <div class="feed-card" onclick="onDelete('${activeDateStr}', ${it.id})">
                        <div class="feed-content">
                            <div class="feed-header-info">
                                <span class="feed-time-text">🕒 ${it.time}</span>
                                ${!hasPhoto ? `<span class="feed-memo">${it.memo || ''}</span>` : ''}
                            </div>
                            ${hasPhoto ? `
                                <div class="feed-memo" style="margin-bottom:5px;">${it.memo || ''}</div>
                                ${photoHtml}
                            ` : ''}
                        </div>
                    </div>`;
            });
        }
        list.innerHTML = html;
    }

    function changeMonth(v) { calendarDate.setMonth(calendarDate.getMonth() + v); renderAll(); }
</script>
</body>
</html>

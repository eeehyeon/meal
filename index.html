<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meal Log PRO | Display Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; color: #222; padding: 10px; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; }
        .btn-m { padding: 8px 15px; background: #f1f3f5; border-radius: 10px; border: none; cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cal-grid div { padding: 12px 0; font-size: 0.95rem; border-radius: 12px; cursor: pointer; }
        .weekday { color: #aaa; font-size: 0.75rem !important; font-weight: bold; pointer-events: none; }
        .day-cell.active { background: #5c7cfa !important; color: white !important; font-weight: bold; }
        .day-cell.has-data::after { content: ''; display: block; width: 5px; height: 5px; background: #ff6b6b; border-radius: 50%; margin: 2px auto 0; }
        .input-row { display: flex; gap: 12px; align-items: flex-start; }
        .photo-area { width: 100px; height: 100px; background: #f8f9fa; border: 2px dashed #ccd0d5; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; overflow: hidden; position: relative; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 1rem; height: 60px; resize: none; font-family: inherit; }
        #fieldTime { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 0.9rem; background: #fff; }
        .save-btn { width: 100%; background: #5c7cfa; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
        .backup-section { margin-top: 30px; text-align: center; padding: 10px; }
        .backup-btn { background: #fff; border: 1px solid #dee2e6; color: #666; padding: 12px 20px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; }
        .feed-card { background: white; border-radius: 20px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: #eee; }
        .grid-item { aspect-ratio: 1/1; position: relative; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .time-stamp { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; font-size: 9px; padding: 3px 5px; border-radius: 4px; font-family: monospace; line-height: 1.2; text-align: right; pointer-events: none; }
        .feed-body { padding: 18px; }
        .feed-time-info { font-size: 0.9rem; color: #5c7cfa; font-weight: bold; margin-bottom: 8px; display: block; }
        .feed-ctrl { display: flex; gap: 25px; font-size: 0.9rem; color: #999; border-top: 1px solid #f1f3f5; padding-top: 12px; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="cal-header"><button class="btn-m" onclick="changeMonth(-1)">◀</button><span id="labelMonth"></span><button class="btn-m" onclick="changeMonth(1)">▶</button></div>
        <div id="gridDays" class="cal-grid"></div>
    </div>
    <div class="card">
        <div class="input-row">
            <div class="photo-area" onclick="document.getElementById('fileIn').click()"><div id="boxPreview">📷 사진 추가</div></div>
            <div class="fields"><input type="datetime-local" id="fieldTime"><textarea id="fieldMemo" placeholder="식단 메모..."></textarea></div>
        </div>
        <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="onFileChange(this)">
        <button class="save-btn" id="saveBtn" onclick="onSave()">오늘의 기록 저장하기</button>
    </div>
    <div id="listFeed"></div>
    <div class="backup-section">
        <button class="backup-btn" onclick="exportData()">💾 전체 데이터 백업 파일 저장</button>
    </div>
</div>

<script>
    const DB_KEY = 'MEAL_LOG_V15_OPTIMIZED';
    let mealDB = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
    let calendarDate = new Date();
    let activeDateStr = "";
    let tempImgs = [];

    window.onload = function() {
        activeDateStr = getFormatDate(new Date());
        initTimeField(new Date());
        renderAll();
    };

    function initTimeField(date) {
        const off = date.getTimezoneOffset() * 60000;
        document.getElementById('fieldTime').value = new Date(date - off).toISOString().slice(0, 16);
    }

    function getFormatDate(date) {
        const d = new Date(date);
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    }

    function compressImage(imgSrc, callback) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            callback(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = imgSrc;
    }

    function onFileChange(input) {
        tempImgs = []; const files = input.files; if (!files.length) return;
        let loaded = 0;
        for (let i = 0; i < files.length; i++) {
            (function(file, idx) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    EXIF.getData(file, function() {
                        const dt = EXIF.getTag(this, "DateTimeOriginal");
                        let pDay = "", pTime = "", pFull = "";
                        if (dt) {
                            const p = dt.split(" ");
                            pDay = p[0].replace(/:/g, "-"); pTime = p[1].substring(0, 5); pFull = pDay + " " + pTime;
                            if (idx === 0) {
                                activeDateStr = pDay; calendarDate = new Date(pDay);
                                document.getElementById('fieldTime').value = pDay + "T" + pTime;
                            }
                        } else {
                            const n = new Date(); pTime = String(n.getHours()).padStart(2, '0') + ":" + String(n.getMinutes()).padStart(2, '0');
                            pFull = getFormatDate(n) + " " + pTime;
                        }
                        compressImage(e.target.result, function(compressedData) {
                            tempImgs.push({ data: compressedData, timeStamp: pFull, timeOnly: pTime });
                            if (idx === 0) document.getElementById('boxPreview').innerHTML = `<img src="${compressedData}">`;
                            loaded++; if (loaded === files.length) renderAll();
                        });
                    });
                };
                reader.readAsDataURL(file);
            })(files[i], i);
        }
    }

    function onSave() {
        const btn = document.getElementById('saveBtn');
        const fTime = document.getElementById('fieldTime').value;
        if (!fTime || btn.disabled) return;
        btn.disabled = true; btn.innerText = "저장 중...";
        const dt = fTime.split("T"); const targetDate = dt[0];
        const record = { id: Date.now(), time: dt[1], memo: document.getElementById('fieldMemo').value, imgs: tempImgs };
        if (!mealDB[targetDate]) mealDB[targetDate] = [];
        mealDB[targetDate].push(record);
        setTimeout(() => {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
                alert(targetDate + " 기록 완료!");
                tempImgs = []; document.getElementById('boxPreview').innerHTML = "📷 사진 추가";
                document.getElementById('fieldMemo').value = "";
                activeDateStr = targetDate; calendarDate = new Date(targetDate);
                renderAll();
            } catch(e) {
                alert("창고 부족! 백업 후 정리해주세요.");
                mealDB[targetDate].pop();
            }
            btn.disabled = false; btn.innerText = "오늘의 기록 저장하기";
        }, 100);
    }

    function renderAll() {
        const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
        document.getElementById('labelMonth').innerText = `${y}.${m + 1}`;
        const startDay = new Date(y, m, 1).getDay(), endDate = new Date(y, m + 1, 0).getDate();
        const grid = document.getElementById('gridDays'); grid.innerHTML = '';
        for (let i = 0; i < startDay; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= endDate; d++) {
            const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const div = document.createElement('div');
            div.className = 'day-cell' + (dStr === activeDateStr ? ' active' : '') + (mealDB[dStr] ? ' has-data' : '');
            div.innerText = d; div.onclick = () => { activeDateStr = dStr; renderAll(); };
            grid.appendChild(div);
        }
        const list = document.getElementById('listFeed');
        const items = mealDB[activeDateStr] || [];
        let html = `<h3 style="padding: 10px 5px;">📂 ${activeDateStr} 기록</h3>`;
        if (!items.length) html += '<p style="text-align:center; padding:50px; color:#ccc;">기록 없음</p>';
        else {
            items.sort((a,b) => a.time.localeCompare(b.time)).forEach(it => {
                let g = ''; 
                const hasPhoto = it.imgs && it.imgs.length > 0;
                
                if (hasPhoto) {
                    g = '<div class="img-grid">';
                    it.imgs.forEach(im => g += `<div class="grid-item"><img src="${im.data}"><span class="time-stamp">${im.timeStamp.replace(' ', '<br>')}</span></div>`);
                    g += '</div>';
                }

                // 사진이 없을 때만 '🕒 기록시간: 11:36' 텍스트를 보여줌
                const timeInfoHtml = hasPhoto ? '' : `<div class="feed-time-info">🕒 기록시간: ${it.time}</div>`;

                html += `<div class="feed-card">${g}<div class="feed-body">
                    ${timeInfoHtml}
                    <div>${it.memo || ''}</div>
                    <div class="feed-ctrl"><span onclick="onEdit('${activeDateStr}', ${it.id})">수정</span>
                    <span onclick="onDelete('${activeDateStr}', ${it.id})" style="color:#ff6b6b">삭제</span></div></div></div>`;
            });
        }
        list.innerHTML = html;
    }

    function exportData() {
        if (Object.keys(mealDB).length === 0) return;
        const blob = new Blob([JSON.stringify(mealDB)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `meal_log_backup_${getFormatDate(new Date())}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function onDelete(d, id) {
        if (!confirm("삭제할까요?")) return;
        mealDB[d] = mealDB[d].filter(x => x.id !== id);
        if (!mealDB[d].length) delete mealDB[d];
        localStorage.setItem(DB_KEY, JSON.stringify(mealDB));
        renderAll();
    }

    function onEdit(d, id) {
        const it = mealDB[d].find(x => x.id === id);
        activeDateStr = d; document.getElementById('fieldMemo').value = it.memo;
        document.getElementById('fieldTime').value = d + "T" + it.time;
        tempImgs = it.imgs || []; if (tempImgs.length) document.getElementById('boxPreview').innerHTML = `<img src="${tempImgs[0].data}">`;
        onDelete(d, id); window.scrollTo(0,0);
    }

    function changeMonth(v) { calendarDate.setMonth(calendarDate.getMonth() + v); renderAll(); }
</script>
</body>
</html>
